<div class="inventory-container">
  <h2>Add New Item</h2>

  <form (ngSubmit)="onSubmit()" #itemForm="ngForm" class="add-item-form">
    <div class="form-group">
      <label>Name:</label>
      <input
        type="text"
        name="name"
        [(ngModel)]="name"
        required
        placeholder="Enter item name"
      />
    </div>

    <div class="form-group">
      <label>Description:</label>
      <textarea
        name="description"
        [(ngModel)]="description"
        placeholder="Enter description"
      ></textarea>
    </div>

    <div class="form-group">
      <label>Price:</label>
      <input
        type="number"
        name="price"
        [(ngModel)]="price"
        required
        placeholder="0.00"
      />
    </div>

    <div class="form-group">
      <label>Category:</label>
      <input
        type="text"
        name="category"
        [(ngModel)]="category"
        placeholder="Enter category"
      />
    </div>

    <button type="submit" [disabled]="!itemForm.form.valid">Add Item</button>
  </form>
</div>
